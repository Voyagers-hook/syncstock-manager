name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref czoppjnkjxmduldxlbqh
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push secrets to Supabase edge functions
        run: |
          supabase secrets set \
            EBAY_APP_ID="${{ secrets.EBAY_APP_ID }}" \
            EBAY_CERT_ID="${{ secrets.EBAY_CERT_ID }}" \
            EBAY_DEV_ID="${{ secrets.EBAY_DEV_ID }}" \
            EBAY_RUNAME="${{ secrets.EBAY_RUNAME }}" \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_KEY }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy edge functions (JWT verification OFF)
        run: |
          supabase functions deploy ebay-import --no-verify-jwt
          supabase functions deploy squarespace-import --no-verify-jwt
          supabase functions deploy push-stock --no-verify-jwt
          supabase functions deploy ebay-auth --no-verify-jwt
          supabase functions deploy order-sync --no-verify-jwt
          supabase functions deploy fix-inventory --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
