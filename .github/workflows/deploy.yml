name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Supabase Edge Functions
        run: |
          supabase functions deploy ebay-import --project-ref czoppjnkjxmduldxlbqh --no-verify-jwt
          supabase functions deploy squarespace-import --project-ref czoppjnkjxmduldxlbqh --no-verify-jwt
          supabase functions deploy push-stock --project-ref czoppjnkjxmduldxlbqh --no-verify-jwt
          supabase functions deploy sync-orders --project-ref czoppjnkjxmduldxlbqh --no-verify-jwt
          supabase functions deploy ebay-auth --project-ref czoppjnkjxmduldxlbqh --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: sbp_829d47e84a87693907aaf53ee56a10fcabfdff94

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: deploy-functions
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
